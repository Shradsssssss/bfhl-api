<!DOCTYPE html>
<html>
<head>
  <title>BFHL API Tester</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }
    textarea {
      width: 100%;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: #0056b3;
    }
    pre {
      background: white;
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
    }
  </style>
</head>
<body>

<h2>BFHL API Tester</h2>

<textarea id="input" rows="6">
["A->B","A->C","B->D"]
</textarea>

<br><br>

<button onclick="send()">Submit</button>

<h3>Output:</h3>
<pre id="output"></pre>

<script>
async function send() {
  try {
    const inputData = JSON.parse(document.getElementById("input").value);

    const response = await fetch("https://bfhl-api-ntui.onrender.com/bfhl", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ data: inputData })
    });

    const result = await response.json();

    document.getElementById("output").innerText =
      JSON.stringify(result, null, 2);

  } catch (error) {
    document.getElementById("output").innerText =
      "Error: " + error.message;
  }
}
</script>

</body>
</html>
